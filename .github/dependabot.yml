version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    # リリース直後の versions を避ける (zizmor: dependabot-cooldown 対策。
    # supply-chain 攻撃の多くは公開直後に検出・取り下げられるため数日置く)。
    cooldown:
      default-days: 7
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
